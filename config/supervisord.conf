[supervisord]
nodaemon=true
user=root
logfile=/var/log/ai-workstation/supervisord.log
pidfile=/var/run/supervisord.pid

[program:sshd]
command=/usr/sbin/sshd -D -e
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/ai-workstation/sshd.log
stderr_logfile=/var/log/ai-workstation/sshd.err.log

[program:xfce]
command=/opt/bin/start-xfce.sh
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/ai-workstation/xfce.log
stderr_logfile=/var/log/ai-workstation/xfce.err.log

[program:vnc]
command=/opt/bin/start-vnc.sh
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/ai-workstation/vnc.log
stderr_logfile=/var/log/ai-workstation/vnc.err.log

[program:novnc]
command=/opt/bin/start-novnc.sh
autostart=true
autorestart=true
priority=40
stdout_logfile=/var/log/ai-workstation/novnc.log
stderr_logfile=/var/log/ai-workstation/novnc.err.log
