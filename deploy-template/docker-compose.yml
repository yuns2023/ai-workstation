services:
  ai-workstation:
    image: ${IMAGE_NAME:-ai-workstation:local}
    hostname: ai-workstation
    env_file:
      - .env
    ports:
      - "${SSH_PORT:-2222}:22"
      - "${WEB_VNC_PORT:-6080}:6080"
    cap_add:
      - NET_ADMIN
    shm_size: "1gb"
    restart: unless-stopped
    volumes:
      - ${HOME_HOST_DIR:-./data/home}:/home
      - ${WORKSPACE_HOST_DIR:-./data/workspace}:/workspace
      - ${LOGS_HOST_DIR:-./logs}:/var/log/ai-workstation
